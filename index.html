  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:#fff;
      color:#111b21;
      min-height:100vh;
    }

    header{
      width:100%;
      height:82px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 38px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:8px;
      color:#25D366;
      font-size:18px;
      font-weight:700;
    }

    .brand-icon{
      width:28px;
      height:28px;
      border:3px solid #25D366;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#25D366;
      font-size:14px;
    }

    nav{
      display:flex;
      align-items:center;
      gap:38px;
      font-size:15px;
    }

    nav a{
      text-decoration:none;
      color:#111;
    }

    .download-btn{
      padding:15px 28px;
      border-radius:40px;
      border:1.5px solid #111;
      background:#25D366;
      text-decoration:none;
      color:#111;
      font-size:16px;
    }

    main{
      width:100%;
      display:flex;
      justify-content:center;
      padding-top:50px;
    }

    .container{
      width:100%;
      max-width:620px;
      text-align:center;
      padding:0 20px;
    }

    /* LOGO */

    .avatar{
      width:116px;
      height:116px;
      border-radius:50%;
      overflow:hidden;
      margin:0 auto 28px;
      background:#53115f;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 5px 20px rgba(0,0,0,0.15);
    }

    .avatar img{
      width:92%;
      height:92%;
      object-fit:contain;
      border-radius:50%;
    }

    h1{
      font-size:25px;
      font-weight:400;
      margin-bottom:34px;
      color:#111;
    }

    .message-box{
      width:540px;
      max-width:100%;
      height:60px;
      margin:0 auto 34px;
      background:#f7f5f3;
      border-radius:14px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:18px;
      color:#444;
      position:relative;
    }

    .message-box::after{
      content:"⌃\A⌄";
      white-space:pre;
      position:absolute;
      right:-12px;
      top:3px;
      font-size:14px;
      line-height:28px;
      color:#777;
    }

    .buttons{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:14px;
      margin-bottom:34px;
    }

    .btn{
      width:260px;
      height:50px;
      border-radius:32px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      font-size:16px;
      transition:0.2s;
    }

    .btn-primary{
      background:#25D366;
      border:1.5px solid #111;
      color:#111;
    }

    .btn-primary:hover{
      background:#1fbe59;
    }

    .btn-secondary{
      background:#fff;
      border:1.5px solid #111;
      color:#111;
    }

    .download-app{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      font-size:17px;
      flex-wrap:wrap;
    }

    .mini-wa{
      width:24px;
      height:24px;
      border-radius:6px;
      background:#25D366;
      display:flex;
      align-items:center;
      justify-content:center;
      color:white;
      font-size:13px;
    }

    .download-app a{
      color:#111;
      text-decoration:none;
      border-bottom:2px solid #25D366;
    }

    @media(max-width:900px){

      nav{
        display:none;
      }

      header{
        padding:0 22px;
      }

    }

    @media(max-width:600px){

      main{
        padding-top:34px;
      }

      .avatar{
        width:104px;
        height:104px;
      }

      h1{
        font-size:24px;
      }

      .message-box{
        font-size:17px;
      }

      .message-box::after{
        right:8px;
      }

      .btn{
        width:100%;
        max-width:260px;
      }

    }

  </style>
</head>

<body>

  <header>

    <div class="brand">
      <div class="brand-icon">☎</div>
      WhatsApp
    </div>

    <nav>
      <a href="#">Características⌄</a>
      <a href="#">Privacidad</a>
      <a href="#">Centro de ayuda</a>
      <a href="#">Blog</a>
      <a href="#">Para empresas</a>
      <a href="#">Aplicaciones</a>
    </nav>

    <a class="download-btn"
       href="https://www.whatsapp.com/download"
       target="_blank">
       Descargar ↓
    </a>

  </header>

  <main>

    <section class="container">

      <!-- LOGO -->
      <div class="avatar">
        <img src="./logo.png" alt="777JUEGOS">
      </div>

      <!-- NOMBRE -->
      <h1>777JUEGOS</h1>

      <!-- MENSAJE -->
      <div class="message-box">
        Hola! quiero un usuar1o:
      </div>

      <!-- BOTONES -->
      <div class="buttons">

        <a
          class="btn btn-primary"
          href="https://wa.me/5491168291698?text=Hola!%20quiero%20un%20usuar1o:"
          onclick="fbq('track', 'Contact');"
        >
          Abrir aplicación
        </a>

        <a
          class="btn btn-secondary"
          href="https://web.whatsapp.com/send?phone=5491168291698&text=Hola!%20quiero%20un%20usuar1o:"
          onclick="fbq('track', 'Contact');"
        >
          Continuar en WhatsApp Web
        </a>

      </div>

      <!-- DESCARGA -->
      <div class="download-app">

        <div class="mini-wa">☎</div>

        <span>¿No tienes la aplicación?</span>

        <a href="https://www.whatsapp.com/download"
           target="_blank">
           Descárgala ahora
        </a>

      </div>

    </section>

  </main>

</body>
</html>
