<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: #ffffff;
      color: #1c1e21;
      min-height: 100vh;
    }

    header {
      width: 100%;
      height: 80px;
      padding: 0 38px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #25d366;
      font-size: 19px;
      font-weight: 700;
    }

    .brand-icon {
      width: 29px;
      height: 29px;
      border: 3px solid #25d366;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      color: #25d366;
    }

    nav {
      display: flex;
      align-items: center;
      gap: 38px;
      font-size: 16px;
      color: #111;
    }

    nav a {
      color: #111;
      text-decoration: none;
      white-space: nowrap;
    }

    .download-btn {
      background: #25d366;
      color: #111;
      border: 1.5px solid #111;
      border-radius: 32px;
      padding: 16px 29px;
      font-size: 16px;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    main {
      min-height: calc(100vh - 80px);
      display: flex;
      justify-content: center;
      padding-top: 54px;
    }

    .content {
      width: 100%;
      max-width: 620px;
      text-align: center;
    }

    .avatar {
      width: 94px;
      height: 94px;
      border-radius: 50%;
      overflow: hidden;
      margin: 0 auto 34px;
      background: #eee;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    h1 {
      font-size: 25px;
      font-weight: 400;
      color: #111;
      margin-bottom: 34px;
    }

    .message-box {
      width: 540px;
      max-width: 100%;
      height: 62px;
      margin: 0 auto 32px;
      background: #f7f5f3;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #4a4a4a;
      font-size: 18px;
      position: relative;
    }

    .message-box::after {
      content: "⌃\A⌄";
      white-space: pre;
      position: absolute;
      right: -12px;
      top: 4px;
      color: #777;
      font-size: 15px;
      line-height: 28px;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 13px;
      margin-bottom: 34px;
    }

    .btn {
      width: 258px;
      height: 50px;
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-size: 16px;
      color: #111;
      transition: 0.2s ease;
    }

    .btn-primary {
      background: #25d366;
      border: 1.5px solid #111;
    }

    .btn-primary:hover {
      background: #1fc45c;
    }

    .btn-secondary {
      background: #fff;
      border: 1.5px solid #111;
    }

    .app-download {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 18px;
      color: #111;
    }

    .small-wa {
      width: 25px;
      height: 25px;
      background: #25d366;
      color: #fff;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
    }

    .app-download a {
      color: #111;
      text-decoration: none;
      border-bottom: 2px solid #25d366;
      font-weight: 500;
    }

    @media (max-width: 900px) {
      nav {
        display: none;
      }

      header {
        padding: 0 22px;
      }

      .download-btn {
        padding: 12px 20px;
      }
    }

    @media (max-width: 600px) {
      main {
        padding: 38px 20px 0;
      }

      .avatar {
        width: 88px;
        height: 88px;
        margin-bottom: 28px;
      }

      h1 {
        font-size: 24px;
        margin-bottom: 28px;
      }

      .message-box {
        width: 100%;
        font-size: 17px;
      }

      .message-box::after {
        right: 8px;
      }

      .btn {
        width: 258px;
      }

      .app-download {
        font-size: 16px;
        flex-wrap: wrap;
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="brand">
      <div class="brand-icon">☎</div>
      WhatsApp
    </div>

    <nav>
      <a href="#">Características⌄</a>
      <a href="#">Privacidad</a>
      <a href="#">Centro de ayuda</a>
      <a href="#">Blog</a>
      <a href="#">Para empresas</a>
      <a href="#">Aplicaciones</a>
    </nav>

    <a class="download-btn" href="https://www.whatsapp.com/download" target="_blank">
      Descargar ↓
    </a>
  </header>

  <main>
    <section class="content">

      <div class="avatar">
        <!-- Subí tu logo como logo.png al mismo repo -->
        <img src="./logo.png" alt="Logo">
      </div>

      <h1>NEBEN</h1>

      <div class="message-box">
        Hola! quiero un usuar1o:
      </div>

      <div class="buttons">
        <a
          class="btn btn-primary"
          href="https://wa.me/5491168291698?text=Hola!%20quiero%20un%20usuar1o:"
          onclick="fbq('track', 'Contact');"
        >
          Abrir aplicación
        </a>

        <a
          class="btn btn-secondary"
          href="https://web.whatsapp.com/send?phone=5491168291698&text=Hola!%20quiero%20un%20usuar1o:"
          onclick="fbq('track', 'Contact');"
        >
          Continuar en WhatsApp Web
        </a>
      </div>

      <div class="app-download">
        <div class="small-wa">☎</div>
        <span>¿No tienes la aplicación?</span>
        <a href="https://www.whatsapp.com/download" target="_blank">Descárgala ahora</a>
      </div>

    </section>
  </main>

</body>
</html>
